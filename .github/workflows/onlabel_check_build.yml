# Workflow triggered when labeling a pull request with `build::check`
# This action is adapted from https://github.com/t4d-gmbh/stubbed_versioning
name: Check Container Builds

on:
  pull_request:
    types: [ labeled ]

env:
  LABEL_CHECK: 'build::check'
  LABEL_SUCCESS: 'build::passed'
  LABEL_FAILURE: 'build::failed'

  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}  # where to register the image
  REPO_PATH: ${{ vars.REPO_PATH }}
  # REPO_PATH: github.com:furrer-lab/abn.git  # for private repo cloned via ssh
  # Set the path to the package where the DESCRIPTION file can be found
  PACKAGE_PATH: ${{ vars.PACKAGE_PATH || './' }}
  JAGS: ${{ vars.JAGS }}
  # this if for the valgrind container only
  DRMEMORY: ${{ vars.DRMEMORY }}
  CHGLOG_RELEASE: ${{ vars.CHGLOG_RELEASE }}
  CHGLOG_PATH: ${{ vars.CHGLOG_PATH }}

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      CUSTOM_TAG: "onlabel-check-build-${{ github.run_number }}"
      BUILDKIT_PROGRESS: plain
    permissions:                       # for `GITHUB_TOKEN`
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu/debian containers
          # See https://r-hub.github.io/containers/containers.html
          - rhub-image: ubuntu-clang
            dockerfile: debian
            label: debian-clang-devel
            compiler: clang
            r-version: devel
            allow-failure: false
          - rhub-image: ubuntu-gcc12
            dockerfile: debian
            label: debian-gcc-devel
            compiler: gcc
            r-version: devel
            allow-failure: false
          - rhub-image: ubuntu-release
            dockerfile: debian
            label: debian-gcc-release
            compiler: gcc
            r-version: release
            allow-failure: false
          - rhub-image: ubuntu-next
            dockerfile: debian
            label: debian-gcc-patched
            compiler: gcc
            r-version: patched
            allow-failure: false
          # Fedora containers (R-hub only provides gcc + R-devel for Fedora)
          - rhub-image: gcc15
            dockerfile: fedora
            label: fedora-gcc-devel
            compiler: gcc
            r-version: devel
            allow-failure: true
          - rhub-image: gcc16
            dockerfile: fedora
            label: fedora-gcc16-devel
            compiler: gcc
            r-version: devel
            allow-failure: true
          # Valgrind container (Fedora-based, gcc, R-devel)
          - rhub-image: valgrind
            dockerfile: valgrind
            label: valgrind-gcc-devel
            compiler: gcc
            r-version: devel
            allow-failure: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ matrix.label }}/abn
          tags: |                     # set Docker tags to git tags
            type=raw,value=${{ env.CUSTOM_TAG }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      - name: Build and push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        continue-on-error: ${{ matrix.allow-failure }}
        with:
          context: ./containers/
          file: ./containers/${{ matrix.dockerfile }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMPILER=${{ matrix.compiler }}
            R_VERSION=${{ matrix.r-version }}
            RHUB_IMAGE=${{ matrix.rhub-image }}
            PACKAGE_PATH=${{ env.PACKAGE_PATH }}
            REPO_PATH=${{ env.REPO_PATH }}
            JAGS=${{ env.JAGS }}
            DRMEMORY=${{ env.DRMEMORY }}
          # For private repo cloned via ssh
          # secret-files: |
          #   key=./ssh_key

  check-images:
    # Determine which container images were successfully pushed by the build job.
    # This produces a dynamic matrix so that container-integrity-and-config only
    # runs for images that actually exist in the registry.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs: [ 'build' ]
    permissions:
      packages: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Log in to the registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check which images exist
        id: set-matrix
        run: |
          labels=("debian-clang-devel" "debian-gcc-devel" "debian-gcc-release" "debian-gcc-patched" "fedora-gcc-devel" "fedora-gcc16-devel" "valgrind-gcc-devel")
          available="[]"
          for label in "${labels[@]}"; do
            image="${REGISTRY}/${REPO}/${label}/abn:${TAG}"
            if docker manifest inspect "$image" > /dev/null 2>&1; then
              echo "  [OK]   $label"
              available=$(echo "$available" | jq -c ". + [{\"label\": \"$label\"}]")
            else
              echo "  [SKIP] $label (image not found)"
            fi
          done
          echo "matrix={\"include\":$available}" >> $GITHUB_OUTPUT
        env:
          REGISTRY: ${{ env.DOCKER_REGISTRY }}
          REPO: ${{ github.repository }}
          TAG: "onlabel-check-build-${{ github.run_number }}"

  container-integrity-and-config:
    if: ${{ !cancelled() && needs.check-images.outputs.matrix != '' && fromJSON(needs.check-images.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-22.04
    needs: [ 'build', 'check-images' ]
    permissions:
      contents: write
      packages: read
    container:
      image: ${{ vars.CONTAINER_SOURCE }}/${{ matrix.label }}/abn:onlabel-check-build-${{ github.run_number }}
      options: --user 1001
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.check-images.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: '0'
    - name: Diagnostics - library paths and installed packages
      run: |
          cat("=== R.home() ===\n")
          cat(R.home(), "\n")
          cat("\n=== .libPaths() ===\n")
          print(.libPaths())
          cat("\n=== R_LIBS_USER ===\n")
          cat(Sys.getenv("R_LIBS_USER", unset = "<unset>"), "\n")
          cat("\n=== R_LIBS_SITE ===\n")
          cat(Sys.getenv("R_LIBS_SITE", unset = "<unset>"), "\n")
          cat("\n=== R_LIBS ===\n")
          cat(Sys.getenv("R_LIBS", unset = "<unset>"), "\n")
          cat("\n=== which R / Rscript ===\n")
          system("which R")
          system("which Rscript")
          cat("\n=== /opt/ contents ===\n")
          print(list.files("/opt/", recursive = FALSE))
          cat("\n=== All installed packages ===\n")
          print(installed.packages()[, c("Package", "LibPath", "Version")])
          cat("\n=== devtools check ===\n")
          tryCatch(
            cat("devtools found at:", find.package("devtools"), "\n"),
            error = function(e) cat("devtools NOT found:", conditionMessage(e), "\n")
          )
      shell: Rscript {0}
    - name: Install knitr
      run: |
          dir.create(Sys.getenv("R_LIBS_USER"), recursive = TRUE)
          .libPaths(Sys.getenv("R_LIBS_USER"))
          install.packages("knitr")
      shell: Rscript {0}
    - name: Write out configuration
      run: |
        Rscript -e 'args<-commandArgs(TRUE);knitr::knit_hooks$set(output = function(x, options){gsub("##", ">\n> ", x)});knitr::knit("src/release_info.tpl", sprintf("info/%s-%s.md", args[1], args[2]))' ${{ matrix.label }} abn
    - name: Save config as artifact
      uses: actions/upload-artifact@v4
      with:
        name: info-artifact-${{ matrix.label }}
        path: info/${{ matrix.label }}-abn.md

  report_build_check:
    if: ${{ !cancelled() }}
    needs:
      - check-images
      - container-integrity-and-config
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if on demand tasks succeeded
        run: |
          gh pr edit ${{ env.EVENT }} --remove-label ${{ env.LABEL_CHECK }} --repo ${{ env.OWNER }}/${{ env.REPO }}
          result="${{ needs.container-integrity-and-config.result }}"
          # 'skipped' means the dynamic matrix was empty (all allow-failure
          # builds failed) — treat it the same as success.
          if [ "$result" == "success" ] || [ "$result" == "skipped" ]; then
            gh pr edit ${{ env.EVENT }} --remove-label ${{ env.LABEL_FAILURE }} --repo ${{ env.OWNER }}/${{ env.REPO }}
            gh pr edit ${{ env.EVENT }} --add-label ${{ env.LABEL_SUCCESS }} --repo ${{ env.OWNER }}/${{ env.REPO }}
            echo "### ${{ github.event.label.url }} passed! :rocket:" >> $GITHUB_STEP_SUMMARY
            exit 0
          elif [ "$result" == "failure" ]; then
            gh pr edit ${{ env.EVENT }} --remove-label ${{ env.LABEL_SUCCESS }} --repo ${{ env.OWNER }}/${{ env.REPO }}
            gh pr edit ${{ env.EVENT  }} --add-label ${{ env.LABEL_FAILURE }} --repo ${{ env.OWNER }}/${{ env.REPO }}
            echo "### ${{ github.event.label.url }} failed!" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            gh pr edit ${{ env.EVENT }} --add-label ${{ env.LABEL_CHECK }} --repo ${{ env.OWNER }}/${{ env.REPO }}
            echo "Container build task outcome was: ${{ needs.container-integrity-and-config.result }}"
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT: ${{ github.event.number }}  # This is either the issue or pr

  record_existing_label:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    outputs:
      passed: ${{ steps.passed.outputs.PASSED}}
    steps:
      - name: Check if the pull request is labeled with ${{ env.LABEL_SUCCESS }}  # 2
        id: passed
        run: |
          if $( gh pr view ${{ env.EVENT }} --repo ${{ env.OWNER }}/${{ env.REPO }} --json "labels" --jq ".[].[].name" | grep --quiet ${{ env.LABEL_SUCCESS }}); then
            echo "PASSED=true" >> $GITHUB_OUTPUT
          else
            echo "PASSED=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT: ${{ github.event.number }}  # This is either the issue or pr

  build_check_passed:
    if: ${{ always() }}
    needs:
      - record_existing_label
      - check-images
      - container-integrity-and-config
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
    steps:
      - name: Assert that either checks passed or the label is present
        run: |
          result="${{ needs.container-integrity-and-config.result }}"
          if [[ "$result" == 'success' || "$result" == 'skipped' || ${{ needs.record_existing_label.outputs.passed }} == 'true' ]]; then
            echo 'The images were built successfully!';
          else exit 1; fi
